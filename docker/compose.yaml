services:
  db:
    image: mysql:5.7
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_unicode_ci
    environment:
      MYSQL_DATABASE: ${CONNECTLIBRARY_DB_NAME:-wordpress}
      MYSQL_USER: ${CONNECTLIBRARY_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${CONNECTLIBRARY_DB_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${CONNECTLIBRARY_DB_ROOT_PASSWORD:-rootpress}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  wordpress:
    image: wordpress:php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${CONNECTLIBRARY_WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${CONNECTLIBRARY_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${CONNECTLIBRARY_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${CONNECTLIBRARY_DB_PASSWORD:-wordpress}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'AUTOMATIC_UPDATER_DISABLED', true );
        define( 'WP_AUTO_UPDATE_CORE', false );
        define( 'WP_CRON_LOCK_TIMEOUT', 120 );
        define( 'AUTOSAVE_INTERVAL', 300 );
        define( 'WP_POST_REVISIONS', 20 );
        define( 'EMPTY_TRASH_DAYS', 7 );
    volumes:
      - wordpress_data:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/connectlibrary-uploads.ini:ro
      - ..:/workspace/connectlibrary:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/wp-admin/install.php >/dev/null || curl -fsS http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18

  wpcli:
    image: wordpress:cli-php8.3
    entrypoint: ["wp"]
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "0:0"
    environment:
      WP_CLI_ALLOW_ROOT: 1
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${CONNECTLIBRARY_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${CONNECTLIBRARY_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${CONNECTLIBRARY_DB_PASSWORD:-wordpress}
    volumes:
      - wordpress_data:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/connectlibrary-uploads.ini:ro
      - ..:/workspace/connectlibrary:ro

volumes:
  db_data:
  wordpress_data:
